<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NOS_ / SATA-CODA by DJ GC77XR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <section class="card">
      <p class="eyebrow">NOS_ / SATA-CODA by DJ GC77XR</p>
      <h1>Calm the mind. Focus the system.</h1>
      <p class="copy">SATA Indigo flows into CODA Gold Yellow for 11 minutes, with a circle pulse shaped like a heartbeat.</p>

      <button id="ritualCircle" class="circle" aria-label="SATA to CODA ritual circle">
        <span class="pulse pulse-a"></span>
        <span class="pulse pulse-b"></span>
        <span class="circle-core"></span>
        <span class="circle-ring"></span>
        <span class="circle-label" id="circleLabel">SATA</span>
      </button>

      <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
      <div class="hud">
        <p class="status" id="statusText">Quiet indigo state. Tap to begin.</p>
        <p class="timer" id="timerText">11:00</p>
      </div>

      <div class="guides">
        <div><strong>1.</strong> Slow breathing.</div>
        <div><strong>2.</strong> Soft attention.</div>
        <div><strong>3.</strong> Observe, then accept.</div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
