<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ GC77XR | Micro Haus</title>
    >
</head>
<body>
    anvas id="vesselCanvas"></canvas>

    <div id="hud" style="display: none;">
        <div id="status-line">STATUS: CALIBRATING // <span id="timer">11:00</span> // <span id="percent">0</span>% COMPLETE</div>
    </div>

    <div id="main-ui">
        <div id="branding-container">
            <div class="presented-by">MICRO HAUS presents</div>
            <div class="artist-name">DJ GC77XR</div>
        </div>
        <h1 id="vessel-title">SATA-CODA</h1>
        <div id="ritual-line">DAILY RITUAL // 77 DAY GIFT CYCLE</div>
    </div>

    <div id="overlay">
        <button id="startButton">BEGIN CALIBRATION</button>
    </div>

    <div id="finalState" style="display: none;">
        <button id="resetButton">RESET - IGNITE - INTEGRATE</button>
    </div>

    <div id="microHausReveal" class="reveal-image">
        <img src="micro-haus.png" alt="Micro Haus">
    </div>

    <div id="endNosReveal" class="reveal-image">
        <img src="end-NOS.png" alt="End NOS">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
