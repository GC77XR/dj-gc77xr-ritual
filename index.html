<!-- output/index.html -->
<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no' />
  <title>SATA-CODA Calibration | DJ GC77XR</title>
  <meta name='description' content='SATA-CODA calibration experience by Mycrore House presents DJ GC77XR.' />
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cinzel:wght@600;700&family=Space+Grotesk:wght@400;500;700&display=swap' rel='stylesheet'>
  <link rel='icon' href='data:;base64,iVBORw0KGgo=' />
  <link rel='stylesheet' href='style.css' />
</head>
<body>
  <canvas id='vesselCanvas'></canvas>
  <div id='hud' class='hud hidden'>
    <div id='statusLine'>STATUS: CALIBRATING // <span id='timer'>11:00</span> // <span id='percent'>0</span>% COMPLETE</div>
    <div id='timeBar'><div id='timeFill'></div></div>
  </div>
  <main id='mainUi' class='panel'>
    <div id='brandingContainer' class='branding'>
      <div class='presentedBy'>Mycrore House presents</div>
      <div class='artistName'>DJ GC77XR</div>
      <div class='calibrationLabel'>SATA Koda Calibration</div>
    </div>
    <button id='startButton' class='startButton' aria-label='Start here'>Start Here</button>
    <a id='giftLink' href='#dailyRitual' class='giftLink'>77-Day Gift Cycle</a>
    <div id='dailyRitual' class='disclaimer'>RESET - IGNITE - INTEGRATE</div>
  </main>
  <section id='microHausReveal' class='reveal hidden'>
    <div class='revealLabel'>MICRO HAUS</div>
    <img src='micro-haus.png' alt='Micro Haus' />
    <div class='revealText'>END PHASE SIGNAL</div>
  </section>
  <section id='endNosReveal' class='reveal hidden'>
    <div class='revealLabel'>END-NOS</div>
    <img src='end-NOS.png' alt='End NOS' />
    <div class='revealText'>RESET - IGNITE - INTEGRATE</div>
    <button id='resetButton'>RESET - IGNITE - INTEGRATE</button>
  </section>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'></script>
  <script src='script.js'></script>
</body>
</html>
