<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DJ GC77XR — Cognitive Ritual</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <section class="card">
      <p class="eyebrow">NOS // SATA → CODA</p>
      <h1>Calm the mind. Focus the system.</h1>
      <p class="copy">An 11-minute ritual that helps the user settle, observe, and activate with a steadier cognitive state.</p>

      <button id="ritualCircle" class="circle" aria-label="Interactive ritual circle">
        <span class="circle-core"></span>
        <span class="circle-ring"></span>
        <span class="circle-label" id="circleLabel">SATA</span>
      </button>

      <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
      <div class="hud">
        <p class="status" id="statusText">Quiet indigo state. Tap to begin.</p>
        <p class="timer" id="timerText">11:00</p>
      </div>

      <div class="guides">
        <div><strong>1.</strong> Slow breathing.</div>
        <div><strong>2.</strong> Soft attention.</div>
        <div><strong>3.</strong> Observe, then accept.</div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
